name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      # Pure docs/meta should not burn multi-arch image builds.
      - "**/*.md"
      - ".helloagents/**"
      - ".tools/**"
      - "docs/**"
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - ".helloagents/**"
      - ".tools/**"
      - "docs/**"
  workflow_dispatch:

# Only keep the newest build for a ref. Intermediate API batch pushes
# no longer waste full multi-arch image builds.
concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: linluaa/togo115-app

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
