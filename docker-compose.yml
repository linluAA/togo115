services:
  togo115:
    image: ghcr.io/linluaa/togo115-app:master
    container_name: togo115
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TOGO115_SECRET_KEY: "please-change-this-secret"
      TOGO115_MONITOR_INTERVAL_SECONDS: "60"
    volumes:
      - ./data:/data
